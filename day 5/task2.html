<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch and Render Data</title>
<style>

#status-message {
    grid-column: 1 / -1;
    text-align: center;
    padding: 30px;
    font-size: 1.2rem;
    font-weight: 500;
    border-radius: 8px;
}

#status-message.loading {
    color: #2563eb;
    background-color: #eff6ff;
    border: 1px dashed #bfdbfe;
}

#status-message.error {
    color: #dc2626;
    background-color: #fef2f2;
    border: 1px solid #fca5a5;
}
</style></head>
<body>
    <header>
        <h1>Welcome to Our Institution</h1>
    </header>

    <div class="departments-grid" id="departments-container">
        <div id="status-message" class="loading">Loading departments, please wait...</div>
    </div>

    <script src="script.js"></script>

</body>
</html>
